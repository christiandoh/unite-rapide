version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-postgres: &hc-postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ussd_admin} -d ${POSTGRES_DB:-ussd_automation}"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

x-healthcheck-redis: &hc-redis
  test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  interval: 10s
  timeout: 3s
  retries: 5

services:
  postgres:
    image: docker.io/postgres:15-alpine
    container_name: ussd_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ussd_automation}
      POSTGRES_USER: ${POSTGRES_USER:-ussd_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck: *hc-postgres
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  redis:
    image: docker.io/redis:7-alpine
    container_name: ussd_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend_network
    healthcheck: *hc-redis
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
      target: production
    container_name: ussd_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      IA_VALIDATOR_URL: http://ia-validator:8000
      WS_SERVER_URL: http://websocket-server:8080
      WAVE_MERCHANT_CODE: ${WAVE_MERCHANT_CODE}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-https://ussd-automation.com}
      PORT: 3000
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - frontend_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ia-validator:
    build:
      context: ./ia-validator
      dockerfile: Dockerfile
    container_name: ussd_ia
    environment:
      MODEL_PATH: /app/ml_models
      CONFIDENCE_THRESHOLD: ${IA_CONFIDENCE_THRESHOLD:-0.85}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads:/app/uploads
      - ./ia-validator/ml_models:/app/ml_models
    networks:
      - backend_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  websocket-server:
    build:
      context: ./websocket-server
      dockerfile: Dockerfile
    container_name: ussd_websocket
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - phone_network
      - frontend_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: ussd_frontend
    environment:
      REACT_APP_API_URL: /api
      REACT_APP_WS_URL: /ws
      REACT_APP_ENV: production
    depends_on:
      - backend-api
    networks:
      - frontend_network
    restart: unless-stopped
    logging: *default-logging

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: ussd_admin
    environment:
      REACT_APP_API_URL: /api
      REACT_APP_ENV: production
    depends_on:
      - backend-api
    networks:
      - frontend_network
    restart: unless-stopped
    logging: *default-logging

  nginx-proxy:
    image: docker.io/nginx:alpine
    container_name: ussd_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8082:80"
    depends_on:
      - frontend-web
      - admin-dashboard
      - backend-api
    networks:
      - frontend_network
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

networks:
  frontend_network:
    name: ussd_frontend_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend_network:
    name: ussd_backend_network
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
  phone_network:
    name: ussd_phone_network
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
