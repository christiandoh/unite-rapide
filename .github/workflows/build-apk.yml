name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'ussd_executor_app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ussd_executor_app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: unite-rapide-apk
          path: ussd_executor_app/build/app/outputs/flutter-apk/app-release.apk
